<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HandbaLiveBV — Generator postări</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c1410;        /* deep court green-black */
    --panel:#13201a;
    --panel2:#1a2c24;
    --line:#274536;
    --green:#16c060;     /* court line green */
    --green-dim:#0f7a3e;
    --live:#ff3b30;      /* broadcast live red */
    --text:#e8f1ec;
    --muted:#8aa79a;
    --field:#0f1a15;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,sans-serif;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 60px}
  header{display:flex;align-items:center;gap:12px;margin:8px 0 22px}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--live);
    box-shadow:0 0 0 0 rgba(255,59,48,.7);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,59,48,.6)}70%{box-shadow:0 0 0 9px rgba(255,59,48,0)}100%{box-shadow:0 0 0 0 rgba(255,59,48,0)}}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;
    text-transform:uppercase;font-size:26px;margin:0}
  h1 span{color:var(--green)}
  .tabs{display:flex;gap:6px;margin-bottom:18px}
  .tab{flex:1;padding:11px;background:var(--panel);border:1px solid var(--line);
    color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:1px;font-size:15px;border-radius:8px;
    cursor:pointer;transition:.15s}
  .tab.on{background:var(--green-dim);border-color:var(--green);color:#fff}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.8px;
    color:var(--muted);margin:0 0 6px;font-weight:600}
  input,textarea{width:100%;background:var(--field);border:1px solid var(--line);
    color:var(--text);border-radius:8px;padding:11px 12px;font-size:15px;font-family:inherit;outline:none}
  input:focus,textarea:focus{border-color:var(--green)}
  .row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .row>div{flex:1;min-width:140px}
  .full{margin-bottom:14px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:12px;padding:5px 10px;background:var(--panel2);border:1px solid var(--line);
    color:var(--muted);border-radius:20px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--green);color:var(--text)}
  .go{width:100%;padding:14px;background:var(--green);color:#04140a;border:none;border-radius:10px;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:1.5px;font-size:18px;cursor:pointer;transition:.15s}
  .go:hover{background:#1ad46c}
  .go:disabled{opacity:.5;cursor:wait}
  .score{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px;
    font-family:'Barlow Condensed',sans-serif}
  .score .t{font-size:18px;font-weight:600;max-width:38%}
  .score .n{font-size:40px;font-weight:700;color:var(--green)}
  .sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:4px}
  .out{white-space:pre-wrap;background:var(--field);border:1px solid var(--line);border-radius:8px;
    padding:16px;font-size:15px;line-height:1.65;margin-top:4px}
  .outbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .outbar h3{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:1px;
    margin:0;font-size:17px;color:var(--green)}
  .copy{padding:8px 14px;background:var(--panel2);border:1px solid var(--green);color:var(--green);
    border-radius:7px;font-weight:600;font-size:13px;cursor:pointer}
  .copy.done{background:var(--green);color:#04140a}
  .err{background:#2a1412;border:1px solid #5a2420;color:#ff8a80;padding:12px 14px;border-radius:8px;font-size:14px}
  .hide{display:none}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);
    border-top-color:#04140a;border-radius:50%;animation:rot .7s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="dot"></span>
    <h1>HandbaLive<span>BV</span> · Generator postări</h1>
  </header>

  <div class="tabs">
    <button class="tab on" id="tabPost" onclick="setMode('post')">După meci</button>
    <button class="tab" id="tabPre" onclick="setMode('pre')">Înainte de meci</button>
  </div>

  <!-- POST-MATCH -->
  <div id="panelPost">
    <div class="card">
      <div class="full">
        <label>ID meci (utakmica)</label>
        <input id="matchId" placeholder="ex: 123456" inputmode="numeric">
        <div class="hint">Numărul din linkul frhlive2.com/indexut.html?utakmica=<b>…</b></div>
      </div>
      <div class="full">
        <label>Context</label>
        <input id="ctxPost" placeholder='ex: finală, Corona campioană la Junioare 1'>
        <div class="chips" id="ctxChips"></div>
      </div>
      <div class="full">
        <label>Link YouTube replay (opțional)</label>
        <input id="ytPost" placeholder="https://www.youtube.com/live/…">
      </div>
      <button class="go" id="goPost" onclick="run('post')">Generează articol</button>
    </div>
  </div>

  <!-- PRE-MATCH -->
  <div id="panelPre" class="hide">
    <div class="card">
      <div class="row">
        <div><label>Gazde</label><input id="home" placeholder="Corona Brașov"></div>
        <div><label>Oaspeți</label><input id="away" placeholder="Rapid București"></div>
      </div>
      <div class="full">
        <label>Context</label>
        <input id="ctxPre" placeholder="finală Junioare 1">
      </div>
      <div class="row">
        <div><label>Ora</label><input id="time" placeholder="13:30"></div>
        <div><label>Locație</label><input id="venue" placeholder="TeraPlast Arena"></div>
        <div><label>Oraș</label><input id="cityPre" placeholder="Bistrița"></div>
      </div>
      <div class="full">
        <label>Link YouTube LIVE</label>
        <input id="ytPre" placeholder="https://www.youtube.com/live/…">
      </div>
      <button class="go" id="goPre" onclick="run('pre')">Generează teaser</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hide">
    <div class="card">
      <div id="scoreBox"></div>
      <div class="outbar">
        <h3>Postare</h3>
        <button class="copy" id="copyBtn" onclick="copyOut()">Copiază</button>
      </div>
      <div class="out" id="out"></div>
    </div>
  </div>

  <div id="errBox"></div>
</div>

<script>
const CONTEXT_CHIPS = [
  "finală, [echipa] campioană",
  "semifinală turneu final",
  "etapa 12, derby local",
  "al 3-lea meci turneu final",
  "meci amical, fără miză"
];

const chips = document.getElementById('ctxChips');
CONTEXT_CHIPS.forEach(c=>{
  const b=document.createElement('span');b.className='chip';b.textContent=c;
  b.onclick=()=>{document.getElementById('ctxPost').value=c;};
  chips.appendChild(b);
});

function setMode(m){
  const post=m==='post';
  document.getElementById('tabPost').classList.toggle('on',post);
  document.getElementById('tabPre').classList.toggle('on',!post);
  document.getElementById('panelPost').classList.toggle('hide',!post);
  document.getElementById('panelPre').classList.toggle('hide',post);
}

function val(id){return document.getElementById(id).value.trim();}
function showErr(msg){document.getElementById('errBox').innerHTML='<div class="err">'+msg+'</div>';}
function clearErr(){document.getElementById('errBox').innerHTML='';}

async function run(mode){
  clearErr();
  document.getElementById('result').classList.add('hide');
  const btn=document.getElementById(mode==='post'?'goPost':'goPre');
  const label=btn.textContent;
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Se generează…';

  let payload={mode};
  if(mode==='post'){
    if(!val('matchId')){btn.disabled=false;btn.textContent=label;return showErr('Introdu ID-ul meciului.');}
    payload.matchId=val('matchId');payload.context=val('ctxPost');payload.youtube=val('ytPost');
  }else{
    payload.home=val('home');payload.away=val('away');payload.context=val('ctxPre');
    payload.time=val('time');payload.venue=val('venue');payload.city=val('cityPre');payload.youtube=val('ytPre');
  }

  try{
    const res=await fetch('/.netlify/functions/generate',{
      method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)
    });
    const data=await res.json();
    if(data.error){showErr(data.error);}
    else{
      document.getElementById('out').textContent=data.article;
      const sb=document.getElementById('scoreBox');
      if(data.matchData){
        const m=data.matchData;
        sb.innerHTML='<div class="score"><span class="t">'+m.home+'</span><span class="n">'+m.score+
          '</span><span class="t">'+m.away+'</span></div><div class="sub">'+(m.competition||'')+
          ' · '+(m.venue||'')+' '+(m.city||'')+' · pauză '+m.ht+'</div>';
      }else{sb.innerHTML='';}
      document.getElementById('result').classList.remove('hide');
      const cp=document.getElementById('copyBtn');cp.textContent='Copiază';cp.classList.remove('done');
      document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
    }
  }catch(e){showErr('Conexiune eșuată: '+e.message);}
  btn.disabled=false;btn.textContent=label;
}

function copyOut(){
  const t=document.getElementById('out').textContent;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById('copyBtn');b.textContent='Copiat ✓';b.classList.add('done');
    setTimeout(()=>{b.textContent='Copiază';b.classList.remove('done');},2000);
  });
}
</script>
</body>
</html>
